name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (NestJS)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      CI: true

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run build --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Unit tests
        run: npm run test --if-present -- --ci

      - name: E2E tests
        run: npm run test:e2e --if-present -- --ci

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      CI: true

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup env
        run: cp .env.example .env

      - name: Type check & build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test (if configured)
        run: npm run test --if-present -- --ci